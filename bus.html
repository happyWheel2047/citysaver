<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>香港巴士 ETA 追蹤器 (九巴+城巴)</title>
    <style>
        :root {
            --bg: #f4f4f9;
            --card-bg: #ffffff;
            --text: #333333;
            --kmb-color: #e60012;
            --ctb-color: #fcd116;
            --ctb-text: #00558f;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei';
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        #app {
            width: 100%;
            max-width: 480px;
            background: var(--bg);
            min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .container {
            padding: 15px;
        }
        .section-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: bold;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }
        .search-box {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        
        /* 表單元素 */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            background-color: #34495e;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }
        button:hover { opacity: 0.9; }
        .btn-add { background-color: #27ae60; margin-top: 5px; }
        
        /* 巴士卡片 */
        .bus-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            position: relative;
        }
        .bus-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .route-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .route-no {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
        .badge-kmb { background-color: var(--kmb-color); color: white; }
        .badge-ctb { background-color: var(--ctb-color); color: var(--ctb-text); }
        
        .stop-name {
            font-size: 0.95rem;
            color: #444;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .dir-tag {
            font-size: 0.8rem;
            color: #888;
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .eta-list { list-style: none; padding: 0; margin: 0; }
        .eta-item {
            padding: 5px 0;
            border-top: 1px dashed #eee;
            display: flex;
            justify-content: space-between;
        }
        .eta-time { font-weight: bold; color: #27ae60; }
        .delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            width: auto;
            padding: 5px 12px;
            font-size: 0.85rem;
            border-radius: 5px;
            margin: 0;
        }
        .refresh-btn { background-color: #3498db; }
        #loadingMsg { display: none; color: #666; font-size: 0.9rem; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="app">
    <header>🚌 香港巴士 ETA 追蹤器</header>
    
    <div class="container">
        <!-- 搜尋路線區 -->
        <div class="search-box">
            <div class="section-title">新增追蹤路線</div>
            <div class="input-group">
                <select id="companySelect" style="flex: 1;">
                    <option value="KMB">九巴 KMB</option>
                    <option value="CTB">城巴 CTB</option>
                </select>
                <select id="dirSelect" style="flex: 1;">
                    <option value="outbound">去程 (Outbound)</option>
                    <option value="inbound">回程 (Inbound)</option>
                </select>
            </div>
            
            <input type="text" id="routeInput" placeholder="輸入路線 (如: 1A, 98D, 8X)" style="text-transform: uppercase;">
            <button onclick="searchRoute()">🔍 搜尋車站</button>
            
            <div id="loadingMsg">載入中...</div>
            
            <div id="stopSelectionArea" style="display: none;">
                <select id="stopSelect">
                    <option value="">請選擇上車地點...</option>
                </select>
                <button class="btn-add" onclick="addFavorite()">加入我的最愛 ❤️</button>
            </div>
        </div>

        <!-- 我的最愛區 -->
        <div class="section-title">我的最愛</div>
        <button class="refresh-btn" onclick="renderFavorites()">🔄 更新所有時間</button>
        <div id="favoritesList"></div>
    </div>
</div>

<script>
    const KMB_API = 'https://data.etabus.gov.hk/v1/transport/kmb';
    const CTB_API = 'https://rt.data.gov.hk/v2/transport/citybus';
    
    let allKmbStopsCache = {}; // 九巴可以一次過攞晒所有站名，城巴就要遂個 API call
    let favorites = JSON.parse(localStorage.getItem('hkbus_favorites')) || [];

    // 初始化：預先獲取九巴所有站名
    async function init() {
        showLoading('正在初始化九巴車站資料庫...');
        try {
            const res = await fetch(`${KMB_API}/stop`);
            const data = await res.json();
            data.data.forEach(stop => {
                allKmbStopsCache[stop.stop] = stop.name_tc;
            });
        } catch (error) {
            console.error('九巴車站資料載入失敗', error);
        }
        hideLoading();
        renderFavorites();
    }

    function showLoading(msg) {
        const el = document.getElementById('loadingMsg');
        el.innerText = msg;
        el.style.display = 'block';
    }

    function hideLoading() {
        document.getElementById('loadingMsg').style.display = 'none';
    }

    // 搜尋路線沿途車站
    async function searchRoute() {
        const company = document.getElementById('companySelect').value;
        const route = document.getElementById('routeInput').value.trim().toUpperCase();
        const dir = document.getElementById('dirSelect').value;
        
        if (!route) return alert('請輸入路線號碼！');

        showLoading(`搜尋緊 ${company} ${route} 嘅車站...`);
        document.getElementById('stopSelectionArea').style.display = 'none';

        try {
            let stopsData = [];
            
            if (company === 'KMB') {
                const res = await fetch(`${KMB_API}/route-stop/${route}/${dir}/1`);
                const data = await res.json();
                if (!data.data || data.data.length === 0) throw new Error('No data');
                
                // 配對九巴站名
                stopsData = data.data.map(item => ({
                    id: item.stop,
                    name: allKmbStopsCache[item.stop] || '未知車站'
                }));
                
            } else if (company === 'CTB') {
                const res = await fetch(`${CTB_API}/route-stop/CTB/${route}/${dir}`);
                const data = await res.json();
                if (!data.data || data.data.length === 0) throw new Error('No data');

                // 城巴冇「所有車站」接口，需要並發去查每個車站嘅名
                const stopIds = data.data.map(item => item.stop);
                showLoading(`下載緊城巴 ${stopIds.length} 個車站名稱...`);
                
                // 用 Promise.all 同時攞站名，加快速度
                const stopPromises = stopIds.map(async id => {
                    try {
                        const sRes = await fetch(`${CTB_API}/stop/${id}`);
                        const sData = await sRes.json();
                        return { id: id, name: sData.data.name_tc };
                    } catch (e) {
                        return { id: id, name: '未知車站' };
                    }
                });
                stopsData = await Promise.all(stopPromises);
            }

            renderStopDropdown(stopsData, company, route, dir);

        } catch (error) {
            alert(`搵唔到呢條路線或暫時冇數據！(請確認路線號碼同埋去程/回程方向係咪正確)`);
        }
        hideLoading();
    }

    // 將車站放入下拉選單
    function renderStopDropdown(stops, company, route, dir) {
        const stopSelect = document.getElementById('stopSelect');
        stopSelect.innerHTML = '<option value="">請選擇上車地點...</option>';

        stops.forEach((stop, index) => {
            const option = document.createElement('option');
            option.value = stop.id;
            option.dataset.route = route;
            option.dataset.company = company;
            option.dataset.dir = dir;
            option.dataset.stopName = stop.name;
            option.textContent = `${index + 1}. ${stop.name}`;
            stopSelect.appendChild(option);
        });

        document.getElementById('stopSelectionArea').style.display = 'block';
    }

    // 將路線加入 localStorage
    function addFavorite() {
        const select = document.getElementById('stopSelect');
        const opt = select.options[select.selectedIndex];
        
        if (!opt.value) return alert('請先選擇一個車站！');

        const newFav = {
            id: Date.now().toString(),
            company: opt.dataset.company,
            route: opt.dataset.route,
            dir: opt.dataset.dir,
            stopId: opt.value,
            stopName: opt.dataset.stopName
        };

        favorites.push(newFav);
        localStorage.setItem('hkbus_favorites', JSON.stringify(favorites));
        renderFavorites();
        
        // 重置
        document.getElementById('stopSelectionArea').style.display = 'none';
        alert('加入成功！');
    }

    function deleteFavorite(id) {
        if(confirm('確定要移除呢個追蹤？')){
            favorites = favorites.filter(fav => fav.id !== id);
            localStorage.setItem('hkbus_favorites', JSON.stringify(favorites));
            renderFavorites();
        }
    }

    // 渲染清單並 Call ETA API
    function renderFavorites() {
        const listDiv = document.getElementById('favoritesList');
        listDiv.innerHTML = '';

        if (favorites.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center; color:#999;">尚未加入任何路線。輸入上面資料開始追蹤啦！</p>';
            return;
        }

        favorites.forEach(fav => {
            // 向下兼容舊版冇 company 同 dir 嘅數據
            const company = fav.company || 'KMB';
            const dirLabel = (fav.dir === 'inbound') ? '回程' : '去程';
            
            const card = document.createElement('div');
            card.className = 'bus-card';
            card.innerHTML = `
                <div class="bus-header">
                    <div class="route-info">
                        <span class="route-no">${fav.route}</span>
                        <span class="badge ${company === 'KMB' ? 'badge-kmb' : 'badge-ctb'}">
                            ${company === 'KMB' ? '九巴' : '城巴'}
                        </span>
                    </div>
                    <button class="delete-btn" onclick="deleteFavorite('${fav.id}')">刪除</button>
                </div>
                <div class="stop-name">
                    <span>📍 ${fav.stopName}</span>
                    <span class="dir-tag">${dirLabel}</span>
                </div>
                <ul class="eta-list" id="eta-${fav.id}">
                    <li class="eta-item" style="color:#999;">載入 ETA 中...</li>
                </ul>
            `;
            listDiv.appendChild(card);
            
            fetchETA(fav, company);
        });
    }

    // 獲取 ETA
    async function fetchETA(fav, company) {
        const etaUl = document.getElementById(`eta-${fav.id}`);
        try {
            let apiURL = '';
            if (company === 'KMB') {
                apiURL = `${KMB_API}/eta/${fav.stopId}/${fav.route}/1`;
            } else {
                apiURL = `${CTB_API}/eta/CTB/${fav.stopId}/${fav.route}`;
            }

            const res = await fetch(apiURL);
            const data = await res.json();
            
            // 九巴同城巴嘅 API 格式好接近，ETA 時間都係放喺 item.eta，只需要過濾自己條路線
            // 加入 dir 驗證以防同一個站有兩個方向嘅站牌
            const reqDir = fav.dir === 'inbound' ? 'I' : 'O';
            
            const validEtas = data.data.filter(item => 
                item.eta != null && 
                item.route === fav.route &&
                (!item.dir || item.dir === reqDir) // 如果 API 有俾 dir 就 match 下，冇就照要
            );
            
            if (validEtas.length === 0) {
                etaUl.innerHTML = '<li class="eta-item" style="color:#e74c3c;">暫時沒有班次資料</li>';
                return;
            }

            etaUl.innerHTML = '';
            const now = new Date();

            // 顯示未來 3 班車
            validEtas.slice(0, 3).forEach(item => {
                const etaTime = new Date(item.eta);
                const diffMs = etaTime - now;
                const diffMins = Math.floor(diffMs / 60000);

                let timeText = '';
                if (diffMins <= 0) timeText = '即將到站 / 已過';
                else if (diffMins === 1) timeText = '1 分鐘內';
                else timeText = `${diffMins} 分鐘`;

                const timeString = etaTime.toLocaleTimeString('zh-HK', {hour: '2-digit', minute:'2-digit'});
                
                // 處理備註 (例如: 實時 / 原定班次)
                const rmk = item.rmk_tc || item.rmk_en || '';
                const rmkHtml = rmk ? `<span style="font-size:0.75rem; color:#888; margin-left:8px;">(${rmk})</span>` : '';

                const li = document.createElement('li');
                li.className = 'eta-item';
                li.innerHTML = `<span>${timeString} ${rmkHtml}</span> <span class="eta-time">${timeText}</span>`;
                etaUl.appendChild(li);
            });

        } catch (error) {
            etaUl.innerHTML = '<li class="eta-item" style="color:#e74c3c;">無法獲取資料</li>';
        }
    }

    // 啟動
    window.onload = init;

</script>
</body>
</html>
