<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <!-- 加入 viewport-fit=cover 適應 iPhone 瀏海/動態島 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>巴士追蹤器</title>

    <!-- 👇 Apple PWA (加入主畫面) 專用設定 👇 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="巴士 ETA">
    <meta name="theme-color" content="#2c3e50">
    
    <!-- 智能生成一個深藍色底嘅巴士 Icon (免圖片檔) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232c3e50%22/><text x=%2250%22 y=%2250%22 font-size=%2260%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>🚌</text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%22 y=%2250%22 font-size=%2260%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>🚌</text></svg>">
    <!-- 👆 Apple PWA 設定完畢 👆 -->

    <!-- 引入 Sortable.js 實現順暢的拖曳排序功能 -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root {
            --bg: #f4f4f9;
            --card-bg: #ffffff;
            --text: #333333;
            --kmb-color: #e60012;
            --ctb-color: #fcd116;
            --ctb-text: #00558f;
            --fare-color: #d35400;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei';
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            /* 避免 iOS 彈性滾動出現白邊 */
            overscroll-behavior-y: none;
        }
        #app {
            width: 100%;
            max-width: 480px;
            background: var(--bg);
            min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #2c3e50;
            color: white;
            /* 加入 env(safe-area-inset-top) 預留位置畀 iPhone 頂部狀態列 */
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container { 
            padding: 15px; 
            flex: 1; 
            /* 預留底部安全區畀 iPhone 橫條 */
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .section-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: bold;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }
        .search-box {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-top: 30px;
            margin-bottom: 20px;
        }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input, select, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            background-color: #34495e;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }
        button:hover { opacity: 0.9; }
        .btn-add { background-color: #27ae60; margin-top: 5px; }
        
        .bus-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            transition: box-shadow 0.2s;
        }
        .bus-card.sortable-ghost {
            opacity: 0.4;
        }
        
        .stop-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .drag-handle {
            cursor: grab;
            font-size: 1.5rem;
            color: #95a5a6;
            margin-right: 12px;
            padding-top: 2px;
            touch-action: none;
        }
        .drag-handle:active { cursor: grabbing; color: #34495e; }
        .stop-title {
            font-size: 1.05rem;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1.4;
            flex: 1;
        }
        
        .tracked-routes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #eee;
        }
        .tracked-tag {
            display: inline-flex;
            align-items: center;
            font-size: 0.85rem;
            padding: 4px 8px;
            border-radius: 15px;
            font-weight: bold;
        }
        .delete-x {
            margin-left: 6px;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
        }
        
        .badge {
            font-size: 0.85rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            min-width: 35px;
            text-align: center;
            display: inline-block;
        }
        .badge-kmb { background-color: var(--kmb-color); color: white; }
        .badge-ctb { background-color: var(--ctb-color); color: var(--ctb-text); }
        
        .fare-tag {
            font-weight: bold;
            color: var(--fare-color);
            background: #fdf2e9;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-left: 5px;
            border: 1px solid #fad7a1;
        }

        .eta-list { list-style: none; padding: 0; margin: 0; }
        .eta-item {
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .eta-item:last-child { border-bottom: none; }
        .eta-left { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }
        .eta-time { font-weight: bold; color: #27ae60; font-size: 1.05rem; white-space: nowrap; }
        
        .refresh-area {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            background: #e8f4fd;
            padding: 10px;
            border-radius: 8px;
        }
        .refresh-btn { 
            background-color: #3498db; 
            margin-bottom: 0; 
            width: auto; 
            padding: 8px 15px; 
        }
        #lastUpdateTime { font-size: 0.85rem; color: #2c3e50; margin-left: 10px; font-weight: bold; }
        #loadingMsg { display: none; color: #666; font-size: 0.9rem; text-align: center; margin-bottom: 10px; }
        
        .manual-fare-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            background: #fef5f0;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px dashed var(--fare-color);
        }
        .manual-fare-label {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--fare-color);
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="app">
    <header>🚌 香港巴士 ETA 追蹤器</header>
    
    <div class="container">
        <!-- 頂部：我的最愛 -->
        <div class="section-title">我的最愛 (50米內智能整合)</div>
        <div class="refresh-area">
            <button class="refresh-btn" onclick="renderFavorites()">🔄 立即更新</button>
            <span id="lastUpdateTime">尚未更新</span>
        </div>
        <div id="favoritesList"></div>

        <!-- 底部：新增追蹤路線 -->
        <div class="search-box">
            <div class="section-title">新增追蹤路線</div>
            <div class="input-group">
                <select id="companySelect" style="flex: 1;">
                    <option value="KMB">九巴 KMB</option>
                    <option value="CTB">城巴 CTB</option>
                </select>
                <select id="dirSelect" style="flex: 1;">
                    <option value="outbound">去程 (Outbound)</option>
                    <option value="inbound">回程 (Inbound)</option>
                </select>
            </div>
            <input type="text" id="routeInput" placeholder="輸入路線 (如: 104, 112, 1A)" style="text-transform: uppercase;">
            <button onclick="searchRoute()">🔍 搜尋車站與車費</button>
            <div id="loadingMsg">載入中...</div>
            
            <div id="stopSelectionArea" style="display: none;">
                <select id="stopSelect" style="margin-bottom: 10px;">
                    <option value="">請選擇上車地點...</option>
                </select>
                <div class="manual-fare-container">
                    <span class="manual-fare-label">💰 車費修正 ($)：</span>
                    <input type="number" id="manualFareInput" step="0.1" placeholder="API無數據時可在此手動輸入">
                </div>
                <button class="btn-add" onclick="addFavorite()">加入我的最愛 ❤️</button>
            </div>
        </div>
    </div>
</div>

<script>
    const KMB_API = 'https://data.etabus.gov.hk/v1/transport/kmb';
    const CTB_API = 'https://rt.data.gov.hk/v2/transport/citybus';
    
    let allKmbStopsCache = {};
    let favorites = JSON.parse(localStorage.getItem('hkbus_favorites')) || [];
    let isUpdating = false;

    function getDistance(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return 9999;
        const R = 6371e3;
        const rad = Math.PI / 180;
        const dLat = (lat2 - lat1) * rad;
        const dLon = (lon2 - lon1) * rad;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * rad) * Math.cos(lat2 * rad) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c; 
    }

    async function init() {
        showLoading('正在初始化車站資料庫...');
        try {
            const res = await fetch(`${KMB_API}/stop`);
            const data = await res.json();
            data.data.forEach(stop => {
                allKmbStopsCache[stop.stop] = {
                    name: stop.name_tc,
                    lat: parseFloat(stop.lat),
                    long: parseFloat(stop.long)
                };
            });
        } catch (error) {
            console.error('九巴車站資料載入失敗', error);
        }
        hideLoading();
        
        renderFavorites();

        new Sortable(document.getElementById('favoritesList'), {
            animation: 150,
            handle: '.drag-handle',
            onEnd: function () {
                let newFavorites = [];
                document.querySelectorAll('.bus-card').forEach(card => {
                    if (card.dataset.ids) {
                        let ids = card.dataset.ids.split(',');
                        ids.forEach(id => {
                            let fav = favorites.find(f => f.id === id);
                            if (fav) newFavorites.push(fav);
                        });
                    }
                });
                favorites = newFavorites;
                localStorage.setItem('hkbus_favorites', JSON.stringify(favorites));
            }
        });

        setInterval(() => {
            if (favorites.length > 0 && document.visibilityState === 'visible' && !isUpdating) {
                renderFavorites();
            }
        }, 60000);

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible" && favorites.length > 0 && !isUpdating) {
                document.getElementById('lastUpdateTime').innerText = "歡迎返嚟！更新中...";
                document.getElementById('lastUpdateTime').style.color = "#e60012";
                setTimeout(() => { renderFavorites(); }, 500);
            }
        });
    }

    function showLoading(msg) {
        document.getElementById('loadingMsg').innerText = msg;
        document.getElementById('loadingMsg').style.display = 'block';
    }

    function hideLoading() {
        document.getElementById('loadingMsg').style.display = 'none';
    }

    async function searchRoute() {
        const company = document.getElementById('companySelect').value;
        const route = document.getElementById('routeInput').value.trim().toUpperCase();
        const dir = document.getElementById('dirSelect').value;
        if (!route) return alert('請輸入路線號碼！');

        showLoading(`搜尋緊 ${company} ${route} 嘅車站同車費...`);
        document.getElementById('stopSelectionArea').style.display = 'none';

        try {
            let stopsData = [];
            let basicFare = '未知'; 

            try {
                if (company === 'KMB') {
                    const fareRes = await fetch(`${KMB_API}/route/${route}/${dir}/1`);
                    const fareData = await fareRes.json();
                    if(fareData.data && fareData.data.basic_fare) basicFare = fareData.data.basic_fare;
                } else if (company === 'CTB') {
                    const fareRes = await fetch(`${CTB_API}/route/CTB/${route}`);
                    const fareData = await fareRes.json();
                    if(fareData.data && fareData.data.basic_fare) basicFare = fareData.data.basic_fare;
                }
            } catch (e) {
                console.warn("無法獲取車費資訊");
            }

            if (company === 'KMB') {
                const res = await fetch(`${KMB_API}/route-stop/${route}/${dir}/1`);
                const data = await res.json();
                if (!data.data || data.data.length === 0) throw new Error('No data');
                
                stopsData = data.data.map(item => {
                    const cache = allKmbStopsCache[item.stop] || { name: '未知車站', lat: 0, long: 0 };
                    return {
                        id: item.stop,
                        name: cache.name,
                        lat: cache.lat,
                        long: cache.long
                    };
                });
            } else if (company === 'CTB') {
                const res = await fetch(`${CTB_API}/route-stop/CTB/${route}/${dir}`);
                const data = await res.json();
                if (!data.data || data.data.length === 0) throw new Error('No data');
                const stopIds = data.data.map(item => item.stop);
                
                const stopPromises = stopIds.map(async id => {
                    try {
                        const sRes = await fetch(`${CTB_API}/stop/${id}`);
                        const sData = await sRes.json();
                        return { 
                            id: id, 
                            name: sData.data.name_tc,
                            lat: parseFloat(sData.data.lat),
                            long: parseFloat(sData.data.long)
                        };
                    } catch (e) {
                        return { id: id, name: '未知車站', lat: 0, long: 0 };
                    }
                });
                stopsData = await Promise.all(stopPromises);
            }
            
            renderStopDropdown(stopsData, company, route, dir, basicFare);
            
        } catch (error) {
            alert(`搵唔到呢條路線或暫時冇數據！`);
        }
        hideLoading();
    }

    function renderStopDropdown(stops, company, route, dir, fare) {
        const stopSelect = document.getElementById('stopSelect');
        stopSelect.innerHTML = '<option value="">請選擇上車地點...</option>';
        stops.forEach((stop, index) => {
            const option = document.createElement('option');
            option.value = stop.id;
            option.dataset.route = route;
            option.dataset.company = company;
            option.dataset.dir = dir;
            option.dataset.stopName = stop.name;
            option.dataset.lat = stop.lat;
            option.dataset.long = stop.long;
            option.dataset.fare = fare; 
            option.textContent = `${index + 1}. ${stop.name} (API: $${fare})`;
            stopSelect.appendChild(option);
        });
        
        const fareInput = document.getElementById('manualFareInput');
        if (fare && fare !== '未知' && !isNaN(fare)) {
            fareInput.value = fare;
        } else {
            fareInput.value = '';
        }
        
        document.getElementById('stopSelectionArea').style.display = 'block';
        
        setTimeout(() => {
            document.querySelector('.search-box').scrollIntoView({ behavior: 'smooth' });
        }, 100);
    }

    function addFavorite() {
        const select = document.getElementById('stopSelect');
        const opt = select.options[select.selectedIndex];
        if (!opt.value) return alert('請先選擇一個車站！');

        const manualFareValue = document.getElementById('manualFareInput').value.trim();
        const finalFare = manualFareValue !== "" ? parseFloat(manualFareValue).toFixed(1) : (opt.dataset.fare || '?');

        favorites.push({
            id: Date.now().toString(),
            company: opt.dataset.company,
            route: opt.dataset.route,
            dir: opt.dataset.dir,
            stopId: opt.value,
            stopName: opt.dataset.stopName,
            lat: parseFloat(opt.dataset.lat) || 0,
            long: parseFloat(opt.dataset.long) || 0,
            fare: finalFare 
        });
        localStorage.setItem('hkbus_favorites', JSON.stringify(favorites));
        renderFavorites();
        document.getElementById('stopSelectionArea').style.display = 'none';
        document.getElementById('routeInput').value = '';
        document.getElementById('manualFareInput').value = '';
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteFavorite(id) {
        if(confirm('確定要移除呢條路線？')){
            favorites = favorites.filter(fav => fav.id !== id);
            localStorage.setItem('hkbus_favorites', JSON.stringify(favorites));
            renderFavorites();
        }
    }

    async function renderFavorites() {
        if (isUpdating) return;
        isUpdating = true;
        
        const listDiv = document.getElementById('favoritesList');

        if (favorites.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center; color:#999; margin: 30px 0;">尚未加入任何路線。向下拉輸入資料開始追蹤啦！</p>';
            document.getElementById('lastUpdateTime').innerText = '尚未有路線';
            isUpdating = false;
            return;
        }

        listDiv.innerHTML = '<p style="text-align:center; color:#666; padding: 20px;">🔄 正在同步並智能整合數據...</p>';

        try {
            const etaPromises = favorites.map(async fav => {
                const company = fav.company || 'KMB';
                const reqDir = fav.dir === 'inbound' ? 'I' : 'O';
                const apiURL = company === 'KMB' 
                    ? `${KMB_API}/eta/${fav.stopId}/${fav.route}/1` 
                    : `${CTB_API}/eta/CTB/${fav.stopId}/${fav.route}`;

                try {
                    const res = await fetch(apiURL);
                    const data = await res.json();
                    const validEtas = data.data.filter(item => 
                        item.eta != null && 
                        item.route === fav.route &&
                        (!item.dir || item.dir === reqDir) 
                    );
                    return { fav, etas: validEtas };
                } catch (e) {
                    return { fav, etas: [] }; 
                }
            });

            const results = await Promise.all(etaPromises);
            const now = new Date();

            const groupedStops = [];

            results.forEach(({ fav, etas }) => {
                const company = fav.company || 'KMB';
                const lat = fav.lat;
                const long = fav.long;

                let targetGroup = groupedStops.find(g => {
                    if (lat && long && g.lat && g.long) {
                        return getDistance(lat, long, g.lat, g.long) <= 50;
                    } 
                    return g.stopNames.includes(fav.stopName);
                });

                if (!targetGroup) {
                    targetGroup = {
                        stopNames: [fav.stopName],
                        lat: lat,
                        long: long,
                        trackedRoutes: [],
                        allEtas: []
                    };
                    groupedStops.push(targetGroup);
                } else {
                    if (!targetGroup.stopNames.includes(fav.stopName)) {
                        targetGroup.stopNames.push(fav.stopName);
                    }
                }
                
                targetGroup.trackedRoutes.push(fav);

                etas.slice(0, 3).forEach(item => {
                    const etaTime = new Date(item.eta);
                    const diffMins = Math.floor((etaTime - now) / 60000);
                    targetGroup.allEtas.push({
                        route: fav.route,
                        company: company,
                        fare: fav.fare || '?', 
                        etaTime: etaTime,
                        diffMins: diffMins,
                        rmk: item.rmk_tc || item.rmk_en || ''
                    });
                });
            });

            listDiv.innerHTML = '';
            
            groupedStops.forEach(group => {
                group.allEtas.sort((a, b) => a.etaTime - b.etaTime);
                const card = document.createElement('div');
                card.className = 'bus-card';
                
                card.dataset.ids = group.trackedRoutes.map(f => f.id).join(',');

                const trackedHtml = group.trackedRoutes.map(fav => {
                    const badgeClass = (fav.company || 'KMB') === 'KMB' ? 'badge-kmb' : 'badge-ctb';
                    const fareText = fav.fare && fav.fare !== '?' ? `($${fav.fare})` : '';
                    return `
                        <span class="tracked-tag ${badgeClass}">
                            ${fav.route} ${fareText}
                            <span class="delete-x" onclick="deleteFavorite('${fav.id}')">✕</span>
                        </span>
                    `;
                }).join('');

                let etaHtml = '';
                if (group.allEtas.length === 0) {
                    etaHtml = '<li class="eta-item" style="color:#e74c3c; justify-content: center;">暫時沒有班次資料</li>';
                } else {
                    etaHtml = group.allEtas.slice(0, 10).map(eta => {
                        let timeText = '';
                        if (eta.diffMins <= 0) timeText = '即將到站';
                        else if (eta.diffMins === 1) timeText = '1 分鐘';
                        else timeText = `${eta.diffMins} 分鐘`;

                        const timeString = eta.etaTime.toLocaleTimeString('zh-HK', {hour: '2-digit', minute:'2-digit'});
                        const rmkHtml = eta.rmk ? `<span style="font-size:0.75rem; color:#888;">(${eta.rmk})</span>` : '';
                        const badgeClass = eta.company === 'KMB' ? 'badge-kmb' : 'badge-ctb';
                        const fareHtml = (eta.fare && eta.fare !== '?') ? `<span class="fare-tag">$${eta.fare}</span>` : '';

                        return `
                            <li class="eta-item">
                                <div class="eta-left">
                                    <span class="badge ${badgeClass}">${eta.route}</span>
                                    ${fareHtml}
                                    <span style="margin-left: 5px; color: #555;">${timeString} ${rmkHtml}</span>
                                </div>
                                <span class="eta-time">${timeText}</span>
                            </li>
                        `;
                    }).join('');
                }

                const uniqueTitles = [...new Set(group.stopNames)];
                const combinedTitle = uniqueTitles.join(' / ');

                card.innerHTML = `
                    <div class="stop-header">
                        <span class="drag-handle" title="按住拖曳排序">≡</span>
                        <div class="stop-title">📍 ${combinedTitle}</div>
                    </div>
                    <div class="tracked-routes">${trackedHtml}</div>
                    <ul class="eta-list">${etaHtml}</ul>
                `;
                listDiv.appendChild(card);
            });

            const timeString = now.toLocaleTimeString('zh-HK', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('lastUpdateTime').innerText = `最後更新: ${timeString}`;
            document.getElementById('lastUpdateTime').style.color = "#2c3e50";

        } catch (error) {
            listDiv.innerHTML = '<p style="text-align:center; color:#e74c3c;">更新失敗，請檢查網絡連接。</p>';
        } finally {
            isUpdating = false;
        }
    }

    window.onload = init;
</script>
</body>
</html>
