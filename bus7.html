<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>香港巴士 ETA 追蹤器 (自訂排版版)</title>
    <style>
        :root {
            --bg: #f4f4f9;
            --card-bg: #ffffff;
            --text: #333333;
            --kmb-color: #e60012;
            --ctb-color: #fcd116;
            --ctb-text: #00558f;
            --fare-color: #d35400;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei';
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        #app {
            width: 100%;
            max-width: 480px;
            background: var(--bg);
            min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container { padding: 15px; flex: 1; }
        .section-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: bold;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }
        .search-box {
            background: #eef2f5;
            padding: 15px;
            border-radius: 10px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            margin-top: 30px;
            border: 1px dashed #bdc3c7;
        }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input, select, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            background-color: #34495e;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }
        button:hover { opacity: 0.9; }
        .btn-add { background-color: #27ae60; margin-top: 5px; }
        
        .bus-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            border-left: 4px solid #3498db;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .stop-title {
            font-size: 1.05rem;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1.4;
            flex: 1;
        }
        /* 上下移動按鈕 */
        .move-controls {
            display: flex;
            gap: 5px;
        }
        .btn-move {
            background: #f1f2f6;
            color: #333;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            padding: 0;
            margin: 0;
            cursor: pointer;
        }
        .btn-move:active { background: #dfe4ea; }
        .btn-move:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .tracked-routes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #eee;
        }
        .tracked-tag {
            display: inline-flex;
            align-items: center;
            font-size: 0.85rem;
            padding: 4px 8px;
            border-radius: 15px;
            font-weight: bold;
        }
        .delete-x {
            margin-left: 6px;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
        }
        
        .badge {
            font-size: 0.85rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            min-width: 35px;
            text-align: center;
            display: inline-block;
        }
        .badge-kmb { background-color: var(--kmb-color); color: white; }
        .badge-ctb { background-color: var(--ctb-color); color: var(--ctb-text); }
        
        .fare-tag {
            font-weight: bold;
            color: var(--fare-color);
            background: #fdf2e9;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-left: 5px;
            border: 1px solid #fad7a1;
        }

        .eta-list { list-style: none; padding: 0; margin: 0; }
        .eta-item {
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .eta-item:last-child { border-bottom: none; }
        .eta-left { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }
        .eta-time { font-weight: bold; color: #27ae60; font-size: 1.05rem; white-space: nowrap; }
        
        .refresh-area {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            background: #e8f4fd;
            padding: 10px;
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .refresh-btn { 
            background-color: #3498db; 
            margin-bottom: 0; 
            width: auto; 
            padding: 8px 12px; 
            font-size: 0.9rem;
        }
        .btn-fare { background-color: #f39c12; }
        #lastUpdateTime { font-size: 0.85rem; color: #2c3e50; font-weight: bold; flex-basis: 100%; }
        #loadingMsg { display: none; color: #666; font-size: 0.9rem; text-align: center; margin-bottom: 10px; }
        
        /* 頁底聲明 */
        .footer-note { text-align: center; font-size: 0.8rem; color: #999; margin-top: 20px; padding-bottom: 20px; }
    </style>
</head>
<body>

<div id="app">
    <header>🚌 你的巴士追蹤器</header>
    
    <div class="container">
        
        <div class="section-title">我的最愛 (100米內整合)
