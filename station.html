<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>到站追蹤器</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="交通 ETA">
    <meta name="theme-color" content="#2c3e50">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232c3e50%22/><text x=%2250%22 y=%2250%22 font-size=%2260%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>🚌</text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%22 y=%2250%22 font-size=%2260%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>🚌</text></svg>">

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root {
            --bg: #f4f4f9;
            --card-bg: #ffffff;
            --text: #333333;
            --kmb-color: #e60012;
            --ctb-color: #fcd116;
            --ctb-text: #00558f;
            --mtr-color: #0070c0;
            --lrt-color: #e67e22;
            --fare-color: #d35400;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei';
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            overscroll-behavior-y: none;
        }
        #app {
            width: 100%;
            max-width: 480px;
            background: var(--bg);
            min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container { 
            padding: 15px; 
            flex: 1; 
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .section-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: bold;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }
        .search-box, .backup-box {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-top: 30px;
            margin-bottom: 10px;
        }
        .backup-box { margin-top: 15px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"], input[type="number"], select, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            background-color: #34495e;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }
        button:hover { opacity: 0.9; }
        .btn-add { background-color: #27ae60; margin-top: 5px; }
        .btn-export { background-color: #e67e22; margin-bottom: 0; }
        .btn-import { background-color: #8e44ad; margin-bottom: 0; }
        
        .bus-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            transition: box-shadow 0.2s;
        }
        .bus-card.sortable-ghost { opacity: 0.4; }
        
        .stop-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .drag-handle {
            cursor: grab;
            font-size: 1.5rem;
            color: #95a5a6;
            margin-right: 12px;
            padding-top: 2px;
            touch-action: none;
        }
        .drag-handle:active { cursor: grabbing; color: #34495e; }
        .stop-title {
            font-size: 1.05rem;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1.4;
            flex: 1;
        }
        
        .tracked-routes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #eee;
        }
        .tracked-tag {
            display: inline-flex;
            align-items: center;
            font-size: 0.85rem;
            padding: 4px 8px;
            border-radius: 15px;
            font-weight: bold;
            line-height: 1.2;
        }
        .dest-text {
            font-size: 0.75rem;
            font-weight: normal;
            margin-left: 4px;
            opacity: 0.9;
        }
        .delete-x {
            margin-left: 6px;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
        }
        
        .badge {
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            min-width: 32px;
            text-align: center;
            display: inline-block;
            flex-shrink: 0;
        }
        .badge-kmb { background-color: var(--kmb-color); color: white; }
        .badge-ctb { background-color: var(--ctb-color); color: var(--ctb-text); }
        .badge-mtr { background-color: var(--mtr-color); color: white; }
        .badge-lrt { background-color: var(--lrt-color); color: white; }
        
        .fare-tag {
            font-weight: bold;
            color: var(--fare-color);
            background: #fdf2e9;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.75rem;
            border: 1px solid #fad7a1;
            flex-shrink: 0;
        }

        .eta-list { list-style: none; padding: 0; margin: 0; }
        
        .eta-item {
            padding: 6px 0;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .eta-item:last-child { border-bottom: none; }
        
        .eta-left { 
            display: flex; 
            align-items: center; 
            flex-wrap: nowrap; 
            gap: 4px; 
            flex: 1;
            overflow: hidden; 
        }
        
        .time-rmk {
            font-size: 0.75rem;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .eta-time { 
            font-weight: bold; 
            color: #27ae60; 
            font-size: 0.9rem; 
            white-space: nowrap; 
            flex-shrink: 0; 
            margin-left: 5px;
        }
        
        .refresh-area {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            background: #e8f4fd;
            padding: 10px;
            border-radius: 8px;
        }
        .refresh-btn { 
            background-color: #3498db; 
            margin-bottom: 0; 
            width: auto; 
            padding: 8px 15px; 
        }
        #lastUpdateTime { font-size: 0.85rem; color: #2c3e50; margin-left: 10px; font-weight: bold; }
        #loadingMsg { display: none; color: #666; font-size: 0.9rem; text-align: center; margin-bottom: 10px; }
        
        .manual-fare-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            background: #fef5f0;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px dashed var(--fare-color);
        }
        .manual-fare-label {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--fare-color);
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="app">
    <header>🇭🇰 綜合交通 ETA 追蹤器</header>
    
    <div class="container">
        <div class="section-title">我的最愛 (自動智能分類)</div>
        <div class="refresh-area">
            <button class="refresh-btn" onclick="renderFavorites()">🔄 立即更新</button>
            <span id="lastUpdateTime">尚未更新</span>
        </div>
        <div id="favoritesList"></div>

        <div class="search-box">
            <div class="section-title">新增追蹤路線/車站</div>
            <div class="input-group">
                <select id="companySelect" style="flex: 1;" onchange="toggleInputs()">
                    <option value="KMB">九巴 KMB</option>
                    <option value="CTB">城巴 CTB</option>
                    <option value="MTR">港鐵 MTR</option>
                    <option value="LRT">輕鐵 LRT</option>
                </select>
                <select id="dirSelect" style="flex: 1;">
                    <option value="outbound">去程 (Outbound)</option>
                    <option value="inbound">回程 (Inbound)</option>
                </select>
            </div>
            
            <input type="text" id="routeInput" placeholder="輸入路線 (如: 104, 1A)" style="text-transform: uppercase;">
            <select id="mtrLineSelect" style="display: none; margin-bottom: 10px;"></select>
            
            <button id="searchBtn" onclick="searchRoute()">🔍 搜尋車站與車費</button>
            <div id="loadingMsg">載入中...</div>
            
            <div id="stopSelectionArea" style="display: none;">
                <select id="stopSelect" style="margin-bottom: 10px;">
                    <option value="">請選擇上車/追蹤地點...</option>
                </select>
                <div class="manual-fare-container" id="fareBox">
                    <span class="manual-fare-label">💰 車費修正 ($)：</span>
                    <input type="number" id="manualFareInput" step="0.1" placeholder="API無數據時可手動輸入">
                </div>
                <button class="btn-add" onclick="addFavorite()">加入我的最愛 ❤️</button>
            </div>
        </div>
        
        <div class="backup-box">
            <div class="section-title">備份與還原資料</div>
            <div class="input-group">
                <button class="btn-export" onclick="exportData()">📤 匯出備份</button>
                <button class="btn-import" onclick="document.getElementById('importFile').click()">📥 匯入備份</button>
                <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </div>
</div>

<script>
    const KMB_API = 'https://data.etabus.gov.hk/v1/transport/kmb';
    const CTB_API = 'https://rt.data.gov.hk/v2/transport/citybus';
    
    // 港鐵路線與車站數據庫
    const MTR_DATA = {
        "TWL": { name: "荃灣綫", stations: { "TSW":"荃灣", "TWH":"大窩口", "KWH":"葵興", "KWF":"葵芳", "LAK":"荔景", "MEF":"美孚", "LCK":"荔枝角", "CSW":"長沙灣", "SSP":"深水埗", "PRE":"太子", "MOK":"旺角", "YMT":"油麻地", "JOR":"佐敦", "TST":"尖沙咀", "ADM":"金鐘", "CEN":"中環" }},
        "KTL": { name: "觀塘綫", stations: { "WHA":"黃埔", "HOM":"何文田", "YMT":"油麻地", "MOK":"旺角", "PRE":"太子", "SKM":"石硤尾", "KOT":"九龍塘", "LOF":"樂富", "WTS":"黃大仙", "DIH":"鑽石山", "CHH":"彩虹", "KOB":"九龍灣", "NGT":"牛頭角", "KWT":"觀塘", "LAT":"藍田", "YAT":"油塘", "TIK":"調景嶺" }},
        "ISL": { name: "港島綫", stations: { "KET":"堅尼地城", "HKU":"香港大學", "SYP":"西營盤", "SHW":"上環", "CEN":"中環", "ADM":"金鐘", "WAC":"灣仔", "CAB":"銅鑼灣", "TIH":"天后", "FOH":"炮台山", "NOP":"北角", "QUB":"鰂魚涌", "TAK":"太古", "SWH":"西灣河", "SKW":"筲箕灣", "HFC":"杏花邨", "CHW":"柴灣" }},
        "TML": { name: "屯馬綫", stations: { "TUM":"屯門", "SIH":"兆康", "TIS":"天水圍", "LOP":"朗屏", "YUL":"元朗", "KSR":"錦上路", "TWW":"荃灣西", "MEF":"美孚", "NAC":"南昌", "AUS":"柯士甸", "ETS":"尖東", "HUH":"紅磡", "HOM":"何文田", "TKW":"土瓜灣", "SUW":"宋皇臺", "KAT":"啟德", "DIH":"鑽石山", "HIK":"顯徑", "TAW":"大圍", "CKT":"車公廟", "STW":"沙田圍", "CIO":"第一城", "SHM":"石門", "TSH":"大水坑", "HEO":"恆安", "MOS":"馬鞍山", "WKS":"烏溪沙" }},
        "EAL": { name: "東鐵綫", stations: { "ADM":"金鐘", "EXC":"會展", "HUH":"紅磡", "MKK":"旺角東", "KOT":"九龍塘", "TAW":"大圍", "SHT":"沙田", "FOT":"火炭", "RAC":"馬場", "UNI":"大學", "TAP":"大埔墟", "TWO":"太和", "FAN":"粉嶺", "SHS":"上水", "LOW":"羅湖", "LMC":"落馬洲" }}
    };

    // 輕鐵常用車站數據庫 (節錄部分，實際搜尋可自定義)
    const LRT_STATIONS = {
        "1":"屯門碼頭", "10":"美樂", "20":"蝴蝶", "30":"輕鐵車廠", "40":"龍門", "50":"青山村", "60":"青雲", "70":"建安",
        "275":"兆康", "295":"建生", "310":"大興(南)", "320":"大興(北)", "430":"新墟", "580":"良景", "600":"屯門", 
        "920":"天水圍", "650":"銀座", "680":"天富", "690":"天逸", "750":"天榮", "610":"元朗", "530":"坑尾村"
    };

    let allKmbStopsCache = {};
    let favorites = JSON.parse(localStorage.getItem('hkbus_favorites')) || [];
    let isUpdating = false;

    // 製作全網反向查找車站代碼 -> 中文名 (用於解析 MTR 目的地)
    const MTR_REVERSE = {};
    Object.values(MTR_DATA).forEach(line => {
        Object.keys(line.stations).forEach(code => {
            MTR_REVERSE[code] = line.stations[code];
        });
    });

    function getDistance(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return 9999;
        const R = 6371e3;
        const rad = Math.PI / 180;
        const dLat = (lat2 - lat1) * rad;
        const dLon = (lon2 - lon1) * rad;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * rad) * Math.cos(lat2 * rad) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c; 
    }

    async function init() {
        showLoading('正在初始化車站資料庫...');
        
        // 準備 MTR Dropdown
        const mtrLineSelect = document.getElementById('mtrLineSelect');
        Object.keys(MTR_DATA).forEach(lineCode => {
            let opt = document.createElement('option');
            opt.value = lineCode;
            opt.textContent = MTR_DATA[lineCode].name;
            mtrLineSelect.appendChild(opt);
        });

        try {
            const res = await fetch(`${KMB_API}/stop`);
            const data = await res.json();
            data.data.forEach(stop => {
                allKmbStopsCache[stop.stop] = {
                    name: stop.name_tc,
                    lat: parseFloat(stop.lat),
                    long: parseFloat(stop.long)
                };
            });
        } catch (error) {
            console.error('九巴車站資料載入失敗', error);
        }
        hideLoading();
        
        renderFavorites();

        new Sortable(document.getElementById('favoritesList'), {
            animation: 150,
            handle: '.drag-handle',
            onEnd: function () {
                let newFavorites = [];
                document.querySelectorAll('.bus-card').forEach(card => {
                    if (card.dataset.ids) {
                        let ids = card.dataset.ids.split(',');
                        ids.forEach(id => {
                            let fav = favorites.find(f => f.id === id);
                            if (fav) newFavorites.push(fav);
                        });
                    }
                });
                favorites = newFavorites;
                localStorage.setItem('hkbus_favorites', JSON.stringify(favorites));
            }
        });

        setInterval(() => {
            if (favorites.length > 0 && document.visibilityState === 'visible' && !isUpdating) {
                renderFavorites();
            }
        }, 60000);
    }

    function toggleInputs() {
        const company = document.getElementById('companySelect').value;
        const routeInput = document.getElementById('routeInput');
        const dirSelect = document.getElementById('dirSelect');
        const mtrLineSelect = document.getElementById('mtrLineSelect');
        const searchBtn = document.getElementById('searchBtn');

        document.getElementById('stopSelectionArea').style.display = 'none';

        if (company === 'MTR') {
            routeInput.style.display = 'none';
            dirSelect.style.display = 'none';
            mtrLineSelect.style.display = 'block';
            searchBtn.innerHTML = '🔍 載入港鐵車站';
        } else if (company === 'LRT') {
            routeInput.style.display = 'none';
            dirSelect.style.display = 'none';
            mtrLineSelect.style.display = 'none';
            searchBtn.innerHTML = '🔍 載入輕鐵車站';
        } else {
            routeInput.style.display = 'block';
            dirSelect.style.display = 'block';
            mtrLineSelect.style.display = 'none';
            searchBtn.innerHTML = '🔍 搜尋車站與車費';
        }
    }

    function showLoading(msg) {
        document.getElementById('loadingMsg').innerText = msg;
        document.getElementById('loadingMsg').style.display = 'block';
    }

    function hideLoading() {
        document.getElementById('loadingMsg').style.display = 'none';
    }

    async function searchRoute() {
        const company = document.getElementById('companySelect').value;
        document.getElementById('stopSelectionArea').style.display = 'none';

        if (company === 'MTR') {
            const line = document.getElementById('mtrLineSelect').value;
            const stations = MTR_DATA[line].stations;
            let stopsData = Object.keys(stations).map((code, index) => ({
                id: code, seq: index, name: stations[code], lat: 0, long: 0
            }));
            renderStopDropdown(stopsData, company, line, 'both', null, '');
            return;
        }

        if (company === 'LRT') {
            let stopsData = Object.keys(LRT_STATIONS).map((code, index) => ({
                id: code, seq: index, name: LRT_STATIONS[code], lat: 0, long: 0
            }));
            renderStopDropdown(stopsData, company, 'LRT', 'both', null, '');
            return;
        }

        // 巴士搜尋邏輯
        const route = document.getElementById('routeInput').value.trim().toUpperCase();
        const dir = document.getElementById('dirSelect').value;
        if (!route) return alert('請輸入路線號碼！');

        showLoading(`搜尋緊 ${company} ${route} 嘅車站同車費...`);

        try {
            let stopsData = [];
            let destName = ''; 

            try {
                if (company === 'KMB') {
                    const fareRes = await fetch(`${KMB_API}/route/${route}/${dir}/1`);
                    const fareData = await fareRes.json();
                    if(fareData.data) destName = fareData.data.dest_tc;
                } else if (company === 'CTB') {
                    const fareRes = await fetch(`${CTB_API}/route/CTB/${route}`);
                    const fareData = await fareRes.json();
                    if(fareData.data) destName = dir === 'outbound' ? fareData.data.dest_tc : fareData.data.orig_tc; 
                }
            } catch (e) { console.warn("無法獲取方向資訊"); }

            let staticFares = null;
            try {
                const staticRes = await fetch(`./fares/${company}/${route}.json`);
                if (staticRes.ok) staticFares = await staticRes.json();
            } catch (e) {}

            if (company === 'KMB') {
                const res = await fetch(`${KMB_API}/route-stop/${route}/${dir}/1`);
                const data = await res.json();
                if (!data.data || data.data.length === 0) throw new Error('No data');
                stopsData = data.data.map(item => {
                    const cache = allKmbStopsCache[item.stop] || { name: '未知車站', lat: 0, long: 0 };
                    return { id: item.stop, seq: item.seq, name: cache.name, lat: cache.lat, long: cache.long };
                });
            } else if (company === 'CTB') {
                const res = await fetch(`${CTB_API}/route-stop/CTB/${route}/${dir}`);
                const data = await res.json();
                if (!data.data || data.data.length === 0) throw new Error('No data');
                const stopPromises = data.data.map(async item => {
                    try {
                        const sRes = await fetch(`${CTB_API}/stop/${item.stop}`);
                        const sData = await sRes.json();
                        return { id: item.stop, seq: item.seq, name: sData.data.name_tc, lat: parseFloat(sData.data.lat), long: parseFloat(sData.data.long) };
                    } catch (e) { return { id: item.stop, seq: item.seq, name: '未知車站', lat: 0, long: 0 }; }
                });
                stopsData = await Promise.all(stopPromises);
            }
            renderStopDropdown(stopsData, company, route, dir, staticFares, destName);
        } catch (error) { alert(`搵唔到呢條路線或暫時冇數據！`); }
        hideLoading();
    }

    function renderStopDropdown(stops, company, route, dir, staticFares, destName) {
        const stopSelect = document.getElementById('stopSelect');
        const fareBox = document.getElementById('fareBox');
        stopSelect.innerHTML = '<option value="">請選擇上車地點...</option>';
        
        // MTR 同 LRT 隱藏車費框
        if(company === 'MTR' || company === 'LRT') {
            fareBox.style.display = 'none';
        } else {
            fareBox.style.display = 'flex';
        }

        let firstValidFare = '';

        stops.forEach((stop, index) => {
            let stopFare = '未知';
            if (staticFares && staticFares[dir] && staticFares[dir][stop.seq]) {
                stopFare = parseFloat(staticFares[dir][stop.seq]).toFixed(1);
            }
            if (index === 0 && stopFare !== '未知') firstValidFare = stopFare;

            const option = document.createElement('option');
            option.value = stop.id;
            option.dataset.route = route;
            option.dataset.company = company;
            option.dataset.dir = dir;
            option.dataset.stopName = stop.name;
            option.dataset.lat = stop.lat;
            option.dataset.long = stop.long;
            option.dataset.fare = stopFare; 
            option.dataset.dest = destName || '';
            
            let label = `${index + 1}. ${stop.name}`;
            if(company === 'KMB' || company === 'CTB') {
                const destLabel = destName ? `往${destName} ` : '';
                label += ` (${destLabel}車費: $${stopFare})`;
            }
            option.textContent = label;
            stopSelect.appendChild(option);
        });
        
        document.getElementById('manualFareInput').value = firstValidFare || '';
        document.getElementById('stopSelectionArea').style.display = 'block';
        
        setTimeout(() => { document.querySelector('.search-box').scrollIntoView({ behavior: 'smooth' }); }, 100);
    }

    function addFavorite() {
        const select = document.getElementById('stopSelect');
        const opt = select.options[select.selectedIndex];
        if (!opt.value) return alert('請先選擇一個車站！');

        const isRail = opt.dataset.company === 'MTR' || opt.dataset.company === 'LRT';
        let finalFare = '?';
        if(!isRail) {
            const manualFareValue = document.getElementById('manualFareInput').value.trim();
            finalFare = manualFareValue !== "" ? parseFloat(manualFareValue).toFixed(1) : (opt.dataset.fare || '?');
        }

        favorites.push({
            id: Date.now().toString(),
            company: opt.dataset.company,
            route: opt.dataset.route,
            dir: opt.dataset.dir,
            stopId: opt.value,
            stopName: opt.dataset.stopName,
            lat: parseFloat(opt.dataset.lat) || 0,
            long: parseFloat(opt.dataset.long) || 0,
            fare: finalFare,
            dest: opt.dataset.dest 
        });
        localStorage.setItem('hkbus_favorites', JSON.stringify(favorites));
        renderFavorites();
        document.getElementById('stopSelectionArea').style.display = 'none';
        document.getElementById('routeInput').value = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteFavorite(id) {
        if(confirm('確定要移除呢個追蹤？')){
            favorites = favorites.filter(fav => fav.id !== id);
            localStorage.setItem('hkbus_favorites', JSON.stringify(favorites));
            renderFavorites();
        }
    }

    function exportData() {
        if (favorites.length === 0) return alert('你仲未有任何紀錄可以備份呀！');
        const dataStr = JSON.stringify(favorites, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `hktraffic_backup_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    if (confirm(`搵到 ${importedData.length} 條紀錄，確定要覆蓋目前嘅資料？`)) {
                        favorites = importedData;
                        localStorage.setItem('hkbus_favorites', JSON.stringify(favorites));
                        renderFavorites();
                        alert('✅ 成功匯入資料！');
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                }
            } catch (error) { alert('❌ 無法讀取檔案內容！'); }
            event.target.value = ''; 
        };
        reader.readAsText(file);
    }

    async function renderFavorites() {
        if (isUpdating) return;
        isUpdating = true;
        const listDiv = document.getElementById('favoritesList');

        if (favorites.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center; color:#999; margin: 30px 0;">尚未加入任何車站。向下拉輸入資料開始追蹤啦！</p>';
            document.getElementById('lastUpdateTime').innerText = '尚未有路線';
            isUpdating = false; return;
        }

        listDiv.innerHTML = '<p style="text-align:center; color:#666; padding: 20px;">🔄 正在獲取實時數據...</p>';

        try {
            const now = new Date();
            
            const etaPromises = favorites.map(async fav => {
                const company = fav.company || 'KMB';
                let parsedEtas = [];

                try {
                    if (company === 'KMB') {
                        const reqDir = fav.dir === 'inbound' ? 'I' : 'O';
                        const res = await fetch(`${KMB_API}/eta/${fav.stopId}/${fav.route}/1`);
                        const data = await res.json();
                        parsedEtas = data.data.filter(i => i.eta && i.route === fav.route && (!i.dir || i.dir === reqDir)).map(i => ({
                            etaTime: new Date(i.eta), dest: fav.dest || '', rmk: i.rmk_tc || i.rmk_en || '', route: fav.route, company, fare: fav.fare
                        }));
                    } else if (company === 'CTB') {
                        const reqDir = fav.dir === 'inbound' ? 'I' : 'O';
                        const res = await fetch(`${CTB_API}/eta/CTB/${fav.stopId}/${fav.route}`);
                        const data = await res.json();
                        parsedEtas = data.data.filter(i => i.eta && i.route === fav.route && (!i.dir || i.dir === reqDir)).map(i => ({
                            etaTime: new Date(i.eta), dest: fav.dest || '', rmk: i.rmk_tc || i.rmk_en || '', route: fav.route, company, fare: fav.fare
                        }));
                    } else if (company === 'MTR') {
                        const res = await fetch(`https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${fav.route}&sta=${fav.stopId}`);
                        const data = await res.json();
                        if(data.status === 1 && data.data) {
                            const lineSta = `${fav.route}-${fav.stopId}`;
                            if(data.data[lineSta]) {
                                ['UP', 'DOWN'].forEach(dir => {
                                    if(data.data[lineSta][dir]) {
                                        data.data[lineSta][dir].forEach(t => {
                                            parsedEtas.push({
                                                etaTime: new Date(t.time.replace(' ', 'T') + '+08:00'),
                                                dest: MTR_REVERSE[t.dest] || t.dest,
                                                rmk: t.plat ? `月台${t.plat}` : '',
                                                route: MTR_DATA[fav.route]?.name || fav.route,
                                                company
                                            });
                                        });
                                    }
                                });
                            }
                        }
                    } else if (company === 'LRT') {
                        const res = await fetch(`https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=${fav.stopId}`);
                        const data = await res.json();
                        if(data.status === 1 && data.platform_list) {
                            data.platform_list.forEach(plat => {
                                plat.route_list.forEach(t => {
                                    let diffMins = 0;
                                    if (t.time_en === 'Arriving' || t.time_tc === '即將抵達') diffMins = 0;
                                    else if (t.time_en.includes('min')) diffMins = parseInt(t.time_en) || 0;
                                    else if (t.time_en === '-') return;
                                    
                                    parsedEtas.push({
                                        etaTime: new Date(now.getTime() + diffMins * 60000),
                                        dest: t.dest_tc, rmk: `月台${plat.platform_id}`, route: t.route_no, company, isLrtDirect: true, rawMins: diffMins
                                    });
                                });
                            });
                        }
                    }
                } catch (e) { console.warn(`Error fetching ${fav.company}`, e); }
                
                return { fav, etas: parsedEtas };
            });

            const results = await Promise.all(etaPromises);
            const groupedStops = [];

            // ⚠️ 核心修改：嚴格繞過 50米智能整合
            results.forEach(({ fav, etas }) => {
                const company = fav.company || 'KMB';
                const lat = fav.lat;
                const long = fav.long;
                const isRail = company === 'MTR' || company === 'LRT';
                
                let targetGroup = null;

                // 如果唔係鐵路，先嘗試搵50米內嘅 Group
                if (!isRail) {
                    targetGroup = groupedStops.find(g => {
                        if (g.isRail) return false; // 確保唔會同港鐵/輕鐵合拼
                        if (lat && long && g.lat && g.long) return getDistance(lat, long, g.lat, g.long) <= 50;
                        return g.stopNames.includes(fav.stopName);
                    });
                }

                // 如果係鐵路，或者搵唔到符合嘅巴士 Group，就獨立開新卡片
                if (!targetGroup) {
                    targetGroup = {
                        isRail: isRail,
                        stopNames: [fav.stopName],
                        lat: lat,
                        long: long,
                        trackedRoutes: [],
                        allEtas: []
                    };
                    groupedStops.push(targetGroup);
                } else if (!targetGroup.stopNames.includes(fav.stopName)) {
                    targetGroup.stopNames.push(fav.stopName);
                }
                
                targetGroup.trackedRoutes.push(fav);

                // 計算每班車時間
                etas.forEach(item => {
                    let diffMins = item.isLrtDirect ? item.rawMins : Math.floor((item.etaTime - now) / 60000);
                    // 如果係巴士最多抽3班，鐵路因為有唔同方向/路線，可以容許入晒再整體排
                    targetGroup.allEtas.push({ ...item, diffMins });
                });
            });

            listDiv.innerHTML = '';
            
            groupedStops.forEach(group => {
                group.allEtas.sort((a, b) => a.etaTime - b.etaTime);
                const card = document.createElement('div');
                card.className = 'bus-card';
                card.dataset.ids = group.trackedRoutes.map(f => f.id).join(',');

                const trackedHtml = group.trackedRoutes.map(fav => {
                    let badgeClass = 'badge-kmb';
                    if(fav.company === 'CTB') badgeClass = 'badge-ctb';
                    if(fav.company === 'MTR') badgeClass = 'badge-mtr';
                    if(fav.company === 'LRT') badgeClass = 'badge-lrt';
                    
                    const showName = fav.company === 'MTR' ? (MTR_DATA[fav.route]?.name || fav.route) : (fav.company === 'LRT' ? '所有路線' : fav.route);
                    const shortDest = fav.dest ? fav.dest.substring(0, 2) : '';
                    const destText = shortDest ? `<span class="dest-text">往${shortDest}</span>` : '';
                    
                    return `<span class="tracked-tag ${badgeClass}">${showName} ${destText} <span class="delete-x" onclick="deleteFavorite('${fav.id}')">✕</span></span>`;
                }).join('');

                let etaHtml = '';
                // 鐵路顯示多啲班次，巴士照舊
                const maxDisplay = group.isRail ? 15 : 10; 
                
                if (group.allEtas.length === 0) {
                    etaHtml = '<li class="eta-item" style="color:#e74c3c; justify-content: center;">暫時沒有班次資料</li>';
                } else {
                    etaHtml = group.allEtas.slice(0, maxDisplay).map(eta => {
                        let timeText = '';
                        if (eta.diffMins <= 0) timeText = '即將到站';
                        else if (eta.diffMins === 1) timeText = '1 分鐘';
                        else timeText = `${eta.diffMins} 分鐘`;

                        const timeString = (!eta.isLrtDirect && eta.diffMins >= 0) ? eta.etaTime.toLocaleTimeString('zh-HK', {hour: '2-digit', minute:'2-digit'}) : '';
                        const rmkHtml = eta.rmk ? `<span style="margin-left:2px; color:#e67e22;">(${eta.rmk})</span>` : '';
                        
                        let badgeClass = 'badge-kmb';
                        if(eta.company === 'CTB') badgeClass = 'badge-ctb';
                        if(eta.company === 'MTR') badgeClass = 'badge-mtr';
                        if(eta.company === 'LRT') badgeClass = 'badge-lrt';

                        const fareHtml = (eta.fare && eta.fare !== '?') ? `<span class="fare-tag">$${eta.fare}</span>` : '';
                        const shortDest = eta.dest ? eta.dest.substring(0, 2) : '';
                        const destHtml = shortDest ? `<span style="font-size:0.75rem; color:#888;">往${shortDest}</span>` : '';

                        return `
                            <li class="eta-item">
                                <div class="eta-left">
                                    <span class="badge ${badgeClass}">${eta.route}</span>
                                    ${destHtml}
                                    ${fareHtml}
                                    <span class="time-rmk">${timeString} ${rmkHtml}</span>
                                </div>
                                <span class="eta-time">${timeText}</span>
                            </li>
                        `;
                    }).join('');
                }

                const uniqueTitles = [...new Set(group.stopNames)];
                const prefixIcon = group.isRail ? '🚇' : '📍';
                const combinedTitle = uniqueTitles.join(' / ');

                card.innerHTML = `
                    <div class="stop-header">
                        <span class="drag-handle" title="按住拖曳排序">≡</span>
                        <div class="stop-title">${prefixIcon} ${combinedTitle}</div>
                    </div>
                    <div class="tracked-routes">${trackedHtml}</div>
                    <ul class="eta-list">${etaHtml}</ul>
                `;
                listDiv.appendChild(card);
            });

            const timeString = now.toLocaleTimeString('zh-HK', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('lastUpdateTime').innerText = `最後更新: ${timeString}`;
            document.getElementById('lastUpdateTime').style.color = "#2c3e50";

        } catch (error) {
            listDiv.innerHTML = '<p style="text-align:center; color:#e74c3c;">更新失敗，請檢查網絡連接。</p>';
        } finally {
            isUpdating = false;
        }
    }

    window.onload = init;
</script>
</body>
